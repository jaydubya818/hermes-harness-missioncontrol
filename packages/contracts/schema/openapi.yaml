openapi: 3.1.0
info:
  title: Hermes MissionControl Contracts
  version: v1
paths: {}
components:
  schemas:
    MissionState:
      type: string
      enum: [pending, running, awaiting_approval, paused, failed, completed, cancelled]
    RunState:
      type: string
      enum: [pending, running, awaiting_approval, paused, failed, completed, cancelled]
    StepKind:
      type: string
      enum: [plan, implement, test, review, deploy]
    StepState:
      type: string
      enum: [pending, ready, running, blocked, awaiting_approval, paused, failed, completed, cancelled]
    ApprovalMode:
      type: string
      enum: [never, on_policy_trigger, always]
    FinalOutcome:
      type: string
      enum: [success, partial, blocked, failed, cancelled]
    EventSource:
      type: string
      enum: [hermes, missioncontrol]
    Mission:
      type: object
      additionalProperties: false
      required: [mission_id, title, workflow, project_id, status, created_at, updated_at]
      properties:
        mission_id: { type: string }
        title: { type: string }
        objective: { type: string }
        workflow: { type: string }
        project_id: { type: string }
        policy_ref: { type: string }
        profile_ref: { type: string }
        repo_path: { type: string }
        workspace_root: { type: string }
        status:
          $ref: '#/components/schemas/MissionState'
        active_run_id: { type: string }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Run:
      type: object
      additionalProperties: false
      required: [run_id, mission_id, status, created_at, updated_at]
      properties:
        run_id: { type: string }
        mission_id: { type: string }
        status:
          $ref: '#/components/schemas/RunState'
        current_step_id: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        approval_id: { type: string }
        summary: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Step:
      type: object
      additionalProperties: false
      required: [step_id, kind, title, state, approval_mode, artifacts]
      properties:
        step_id: { type: string }
        kind:
          $ref: '#/components/schemas/StepKind'
        title: { type: string }
        state:
          $ref: '#/components/schemas/StepState'
        approval_mode:
          $ref: '#/components/schemas/ApprovalMode'
        risk:
          type: string
          enum: [low, medium, high]
        execution_id: { type: string }
        approval_id: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        blocked_reason: { type: string }
        notes: { type: string }
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactRef'
    ArtifactRef:
      type: object
      additionalProperties: false
      required: [artifact_id, kind, uri, label]
      properties:
        artifact_id: { type: string }
        kind: { type: string }
        uri: { type: string }
        label: { type: string }
        content_type: { type: string }
        created_at: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
    ApprovalRequest:
      type: object
      additionalProperties: false
      required: [approval_id, mission_id, run_id, step_id, reason, decision_scope, requested_at]
      properties:
        approval_id: { type: string }
        mission_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        reason: { type: string }
        decision_scope:
          type: string
          enum: [step, run]
        requested_at: { type: string, format: date-time }
    ApprovalResult:
      type: object
      additionalProperties: false
      required: [approval_id, decision, resolved_at]
      properties:
        approval_id: { type: string }
        decision:
          type: string
          enum: [approved, rejected]
        resolved_at: { type: string, format: date-time }
        resolved_by: { type: string }
    RepoScope:
      type: object
      additionalProperties: false
      required: [root_path, writable_paths]
      properties:
        root_path: { type: string }
        writable_paths:
          type: array
          items: { type: string }
    ResourceBudget:
      type: object
      additionalProperties: false
      required: [token_budget, max_artifacts, max_output_bytes]
      properties:
        token_budget: { type: integer }
        max_artifacts: { type: integer }
        max_output_bytes: { type: integer }
    ExecutionEnvelope:
      type: object
      additionalProperties: false
      required: [worktree_path, workspace_root, repo_scope, allowed_tools, allowed_actions, approval_mode, timeout_seconds, resource_budget, output_dir, environment_classification]
      properties:
        worktree_path: { type: string }
        workspace_root: { type: string }
        repo_scope:
          $ref: '#/components/schemas/RepoScope'
        allowed_tools:
          type: array
          items: { type: string }
        allowed_actions:
          type: array
          items: { type: string }
        approval_mode:
          $ref: '#/components/schemas/ApprovalMode'
        timeout_seconds: { type: integer }
        resource_budget:
          $ref: '#/components/schemas/ResourceBudget'
        output_dir: { type: string }
        environment_classification:
          type: string
          enum: [sandbox, staging, production, local]
    StepExecutionRequest:
      type: object
      additionalProperties: false
      required: [mission_id, run_id, step_id, execution_id, kind, envelope]
      properties:
        mission_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        execution_id: { type: string }
        kind:
          $ref: '#/components/schemas/StepKind'
        repo_path: { type: string }
        branch_name: { type: string }
        envelope:
          $ref: '#/components/schemas/ExecutionEnvelope'
    TaskExecutionResult:
      type: object
      additionalProperties: false
      required:
        [execution_id, mission_id, run_id, step_id, final_outcome, summary, artifacts, changed_files, issues, approval_needed]
      properties:
        execution_id: { type: string }
        mission_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        final_outcome:
          $ref: '#/components/schemas/FinalOutcome'
        summary: { type: string }
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactRef'
        changed_files:
          type: array
          items: { type: string }
        issues:
          type: array
          items: { type: string }
        approval_needed: { type: boolean }
        recommended_next_step:
          $ref: '#/components/schemas/StepKind'
        confidence: { type: number }
        command_refs:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [kind, label, ref]
            properties:
              kind: { type: string }
              label: { type: string }
              ref: { type: string }
    EventEnvelope:
      type: object
      additionalProperties: false
      required: [schema_version, event_id, timestamp, sequence, source, type, mission_id, payload]
      properties:
        schema_version:
          type: string
          enum: [v1]
        event_id: { type: string }
        timestamp: { type: string, format: date-time }
        sequence: { type: integer }
        source:
          $ref: '#/components/schemas/EventSource'
        type:
          type: string
          enum:
            - mission.created
            - mission.updated
            - mission.paused
            - mission.running
            - mission.cancelled
            - mission.completed
            - run.started
            - run.running
            - run.paused
            - run.completed
            - run.failed
            - run.cancelled
            - step.started
            - step.progress
            - step.blocked
            - step.paused
            - step.resumed
            - step.completed
            - step.failed
            - step.cancelled
            - step.retried
            - tool.started
            - tool.completed
            - tool.failed
            - artifact.created
            - approval.requested
            - approval.resolved
            - eval.started
            - eval.completed
            - eval.failed
            - policy.violation
            - execution.timeout
            - execution.budget_exceeded
        mission_id: { type: string }
        run_id: { type: string }
        step_id: { type: string }
        execution_id: { type: string }
        actor: { type: string }
        payload:
          type: object
          additionalProperties: true
    ContractError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, retryable]
          properties:
            code:
              type: string
              enum:
                - INVALID_ENVELOPE
                - UNAUTHORIZED_TOOL
                - STEP_TIMEOUT
                - INTERRUPTED
                - POLICY_BLOCKED
                - INTERNAL_EXECUTION_ERROR
                - CONTEXT_LOAD_FAILED
            message: { type: string }
            retryable: { type: boolean }
            details:
              type: object
              additionalProperties: true
